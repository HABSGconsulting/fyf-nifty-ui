# wrangler.toml — fyf-nifty-ui
# Cloudflare Pages configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "fyf-nifty-ui"
pages_build_output_dir = "public"
compatibility_date = "2025-01-01"

# ── KV Namespace binding ─────────────────────────────────────────
# Binding name must match what worker/index.js uses: env.NIFTY_CHART_DATA
# kv_namespaces is NOT inherited by [env.*] blocks in Pages —
# so we declare it at the top level only (no [env.*] overrides needed).

[[kv_namespaces]]
binding    = "NIFTY_CHART_DATA"
id         = "47da474c07314acabd6a044951afe270"
preview_id = "47da474c07314acabd6a044951afe270"

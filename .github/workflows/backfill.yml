name: Backfill

# Populates data/snapshots/ for a historical date range.
# Use on initial setup or to fill gaps in the snapshot archive.
# Uses backfill_bulk.py which fetches the full range in ONE yfinance call —
# avoids NSE CI blocks and yfinance per-request rate limiting.
# Also writes chart-data.json to Cloudflare KV after building.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD, inclusive)'
        required: true
      end_date:
        description: 'End date (YYYY-MM-DD, inclusive)'
        required: true
      dry_run:
        description: 'Build JSONs but skip Git commit and KV write'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  backfill:
    name: Backfill ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout UI repo
        uses: actions/checkout@v4

      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          repository: HABSGconsulting/fyf-nifty-engine
          token: ${{ secrets.GH_PAT }}
          path: engine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Configure git
        run: |
          git -C engine config user.name "fyf-nifty-bot"
          git -C engine config user.email "bot@fundyourfreedom.in"

      - name: Run backfill_bulk.py (single yfinance call)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          DRYRUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRYRUN_FLAG="--dry-run"
          fi
          python engine/pipeline/backfill_bulk.py \
            --start ${{ github.event.inputs.start_date }} \
            --end   ${{ github.event.inputs.end_date }} \
            $DRYRUN_FLAG

      - name: Run build_chart_data.py
        run: python engine/pipeline/build_chart_data.py

      - name: Run kv_writer.py
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python engine/pipeline/kv_writer.py

      - name: Skip KV write (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "DRY RUN — snapshots built, no commit or KV write made."

      - name: Commit snapshots to engine repo
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          cd engine
          git add data/snapshots/ data/chart-data.json
          git diff --cached --quiet || git commit -m "nifty-bot: backfill ${{ github.event.inputs.start_date }} to ${{ github.event.inputs.end_date }} [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/HABSGconsulting/fyf-nifty-engine.git HEAD:master

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.create({
              owner: 'HABSGconsulting',
              repo: 'fyf-nifty-engine',
              title: `[Backfill] Failed — ${{ github.event.inputs.start_date }} to ${{ github.event.inputs.end_date }}`,
              body: `## Backfill failed\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug']
            })

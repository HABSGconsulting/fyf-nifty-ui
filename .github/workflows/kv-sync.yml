name: KV Sync

# Rebuilds chart-data.json from existing snapshots and pushes to Cloudflare KV.
# Use this when:
#   - Backfill was run but KV was never updated (chart shows "Could not load data")
#   - chart-data.json needs rebuilding without fetching new price data
#   - Manual recovery after a failed KV write

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build chart-data.json but skip KV write'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  kv-sync:
    name: Build chart-data.json → Write KV
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout UI repo
        uses: actions/checkout@v4

      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          repository: HABSGconsulting/fyf-nifty-engine
          token: ${{ secrets.GH_PAT }}
          path: engine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Configure git
        run: |
          git -C engine config user.name "fyf-nifty-bot"
          git -C engine config user.email "bot@fundyourfreedom.in"

      - name: Run build_chart_data.py
        run: python engine/pipeline/build_chart_data.py

      - name: Run kv_writer.py
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python engine/pipeline/kv_writer.py

      - name: Skip KV write (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "DRY RUN — KV write skipped."

      - name: Commit chart-data.json to engine repo
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          cd engine
          git add data/chart-data.json
          git diff --cached --quiet || git commit -m "nifty-bot: kv-sync $(date +%Y-%m-%d) [skip ci]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/HABSGconsulting/fyf-nifty-engine.git HEAD:master

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.create({
              owner: 'HABSGconsulting',
              repo: 'fyf-nifty-engine',
              title: `[KV Sync] Failed — ${new Date().toISOString().slice(0,10)}`,
              body: `## KV Sync failed\n\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug']
            })
